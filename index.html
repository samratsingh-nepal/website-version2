<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <!-- Cache busting: always get latest version -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Da Aloo – Where Hunger Comes to an End</title>
    <!-- Preconnect to Google Fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="site-header">
    <div class="container">
        <div class="header-content">
            <div class="logo-section">
                <div class="logo-container">
                    <img src="images/logo.png" alt="Da Aloo Logo" class="main-logo">
                    <div class="tagline">"Where Hunger Comes to an End"</div>
                </div>
            </div>
            <nav class="site-nav" aria-label="Main navigation">
                <a href="index.html" class="nav-link active" aria-current="page">Menu</a>
                <a href="offers.html" class="nav-link">Offers</a>
                <a href="about.html" class="nav-link">About</a>
            </nav>
        </div>
    </div>
</header>

<main>
    <section class="menu-section">
        <div class="container">
            <div class="menu-header">
                <h1 class="section-title menu-page-title">Our Menu</h1>
                <button class="save-menu-btn" id="saveMenuBtn" aria-label="Save menu as image">
                    <i class="fas fa-file-pdf"></i> Save Menu
                </button>
            </div>

            <div class="cart-container">
                <div class="cart-icon" id="cartIcon" aria-label="Shopping cart" role="button" tabindex="0">
                    <i class="fas fa-shopping-cart"></i>
                    <span class="cart-badge" id="cartBadge">0</span>
                </div>
            </div>

            <div class="category-tabs" id="categoryTabs" role="tablist"></div>
            <div class="menu-items-grid" id="menuItems"></div>
        </div>
    </section>
</main>

<!-- Cart Modal -->
<div class="cart-modal" id="cartModal" role="dialog" aria-modal="true" aria-labelledby="cartModalTitle">
    <div class="cart-modal-content">
        <div class="cart-modal-header">
            <h2 id="cartModalTitle">Your Order</h2>
            <span class="close-cart" id="closeCart" aria-label="Close cart">&times;</span>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-total" id="cartTotal">Total: Rs 0</div>
        <div class="cart-actions">
            <button class="checkout-btn" id="checkoutBtn" aria-label="Proceed to location">
                <i class="fas fa-map-marker-alt"></i> Confirm Location
            </button>
        </div>
    </div>
</div>

<!-- Item Customization Modal (for variants only, e.g., Mo:Mo) -->
<div class="customization-modal" id="customizationModal" role="dialog" aria-modal="true" aria-labelledby="customizationModalTitle">
    <div class="customization-modal-content">
        <div class="customization-header">
            <h3 id="customizationModalTitle">Select Variant</h3>
            <span class="close-customization" id="closeCustomization" aria-label="Close customization">&times;</span>
        </div>
        <div class="customization-body" id="customizationBody"></div>
        <div class="customization-actions">
            <button class="cancel-customization" id="cancelCustomization">Cancel</button>
            <button class="add-to-cart-custom" id="addToCartCustom">Add to Cart - Rs <span id="customTotalPrice">0</span></button>
        </div>
    </div>
</div>

<footer class="site-footer">
    <div class="container">
        <p>&copy; <span id="currentYear"></span> Da Aloo. All rights reserved.</p>
    </div>
</footer>

<a class="floating-whatsapp" href="tel:+9779847375984" aria-label="Call us">
    <i class="fas fa-phone-alt"></i> Call Now
</a>

<div class="save-notification" id="saveNotification" aria-live="polite">
    <div class="notification-content">
        <i class="fas fa-check-circle"></i>
        <span>Menu image downloaded successfully!</span>
    </div>
</div>

<!-- Scripts -->
<script>
    // --- Google Analytics ---
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-CFXTRJEMHN');
</script>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CFXTRJEMHN"></script>

<script>
    // ---------- MENU DATA (fallback) ----------
    // This will be overwritten by menu.json if fetch succeeds.
    let MENU = {};

    // ---------- GLOBALS ----------
    let cart = [];
    let currentCustomizationItem = null;
    let menuDataLoaded = false;

    // ---------- HELPER FUNCTIONS ----------
    const parsePrice = (price) => {
        if (typeof price === 'string') {
            if (price.includes('-')) return parseInt(price.split('-')[0]);
            return parseInt(price) || 0;
        }
        return price;
    };

    // Save cart to localStorage with error handling
    function saveCart() {
        try {
            localStorage.setItem('daAlooCart', JSON.stringify(cart));
        } catch (error) {
            console.error('Error saving cart to localStorage:', error);
            // Fallback to sessionStorage
            try {
                sessionStorage.setItem('daAlooCart', JSON.stringify(cart));
            } catch (e) {
                console.error('Fallback sessionStorage also failed:', e);
                alert('Unable to save your cart. Please try again.');
            }
        }
    }

    function loadCart() {
        try {
            const saved = localStorage.getItem('daAlooCart');
            if (saved) {
                cart = JSON.parse(saved);
                // Rehydrate availableExtras if needed (for backwards compatibility)
                cart = cart.map(item => {
                    item.availableExtras = item.availableExtras || [];
                    return item;
                });
            } else {
                const sessionSaved = sessionStorage.getItem('daAlooCart');
                if (sessionSaved) cart = JSON.parse(sessionSaved);
            }
        } catch (e) {
            console.error('Failed to load cart:', e);
            cart = [];
        }
        updateCartBadge();
    }

    function updateCartBadge() {
        const badge = document.getElementById('cartBadge');
        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        badge.textContent = totalItems;
        if (totalItems > 0) badge.classList.add('bounce');
        setTimeout(() => badge.classList.remove('bounce'), 400);
    }

    function updateCartDisplay() {
        const cartItemsDiv = document.getElementById('cartItems');
        const cartTotalSpan = document.getElementById('cartTotal');

        if (!cart.length) {
            cartItemsDiv.innerHTML = `<div class="empty-cart-message"><i class="fas fa-shopping-cart"></i><p>Your cart is empty</p></div>`;
            cartTotalSpan.textContent = 'Total: Rs 0';
            return;
        }

        let itemsHTML = '';
        let total = 0;

        cart.forEach((item, idx) => {
            const extrasTotal = item.extras.reduce((s, e) => s + e.price, 0);
            const itemTotal = (item.basePrice + extrasTotal) * item.quantity;
            total += itemTotal;

            let variantHTML = item.variant ? `<div class="cart-item-variant">Variant: ${item.variant.name}</div>` : '';
            let extrasHTML = '';

            if (item.availableExtras && item.availableExtras.length) {
                // Group extras by radio groups
                const groups = {};
                item.availableExtras.forEach(extra => {
                    const group = extra.group || 'default';
                    if (!groups[group]) groups[group] = [];
                    groups[group].push(extra);
                });

                extrasHTML = '<div class="cart-extras-options">';
                for (const [group, extras] of Object.entries(groups)) {
                    const isRadio = extras[0].type === 'radio';
                    extrasHTML += `<div class="extras-group ${isRadio ? 'radio-group' : ''}">`;
                    extras.forEach(opt => {
                        const isChecked = item.extras.some(e => e.name === opt.name);
                        if (isRadio) {
                            extrasHTML += `
                                <label class="cart-extra-label">
                                    <input type="radio" name="extra-${idx}-${group}" class="extra-radio"
                                           data-index="${idx}" data-name="${opt.name}" data-price="${opt.price}" data-group="${group}"
                                           ${isChecked ? 'checked' : ''}>
                                    ${opt.name} ${opt.price > 0 ? `(+Rs ${opt.price})` : ''}
                                </label>`;
                        } else {
                            extrasHTML += `
                                <label class="cart-extra-label">
                                    <input type="checkbox" class="extra-checkbox"
                                           data-index="${idx}" data-name="${opt.name}" data-price="${opt.price}"
                                           ${isChecked ? 'checked' : ''}>
                                    ${opt.name} (+Rs ${opt.price})
                                </label>`;
                        }
                    });
                    extrasHTML += '</div>';
                }
                extrasHTML += '</div>';
            }

            itemsHTML += `
                <div class="cart-item">
                    <div class="cart-item-info">
                        <div class="cart-item-name">${escapeHtml(item.name)} × ${item.quantity}</div>
                        ${variantHTML}
                        ${extrasHTML}
                        <div class="cart-item-price">Rs ${itemTotal}</div>
                    </div>
                    <div class="cart-item-controls">
                        <button class="quantity-btn" data-index="${idx}" data-action="decrease" aria-label="Decrease quantity">-</button>
                        <span class="quantity-display">${item.quantity}</span>
                        <button class="quantity-btn" data-index="${idx}" data-action="increase" aria-label="Increase quantity">+</button>
                        <button class="remove-btn" data-index="${idx}" aria-label="Remove item"><i class="fas fa-trash"></i></button>
                    </div>
                </div>`;
        });

        cartItemsDiv.innerHTML = itemsHTML;
        cartTotalSpan.textContent = `Total: Rs ${total}`;
    }

    // Simple escape to prevent XSS
    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function addToCart(name, basePrice, variant = null, extras = [], availableExtras = []) {
        const cartItem = {
            name,
            basePrice,
            variant,
            extras: [...extras],
            availableExtras: [...availableExtras],
            quantity: 1,
            totalPrice: basePrice + extras.reduce((s, e) => s + e.price, 0)
        };

        // If no availableExtras, we can merge identical items
        let existingIndex = -1;
        if (availableExtras.length === 0) {
            existingIndex = cart.findIndex(item =>
                item.name === cartItem.name &&
                JSON.stringify(item.variant) === JSON.stringify(cartItem.variant) &&
                JSON.stringify(item.extras) === JSON.stringify(cartItem.extras)
            );
        }

        if (existingIndex > -1) {
            cart[existingIndex].quantity += 1;
            const extrasSum = cart[existingIndex].extras.reduce((s, e) => s + e.price, 0);
            cart[existingIndex].totalPrice = (cart[existingIndex].basePrice + extrasSum) * cart[existingIndex].quantity;
        } else {
            cart.push(cartItem);
        }

        saveCart();
        updateCartBadge();

        // If cart modal is open, refresh it
        const modal = document.getElementById('cartModal');
        if (modal.style.display === 'block') updateCartDisplay();
    }

    function findMenuItem(itemName) {
        for (const category in MENU) {
            const found = MENU[category].find(item => item.name === itemName);
            if (found) return found;
        }
        return null;
    }

    // ---------- UI RENDERING (Menu & Tabs) ----------
    const categoryImages = {
        "Aloo Fries": "images/categories/aloo-fries.jpg",
        "Da Aloo Special": "images/categories/special.jpg",
        "Spirals": "images/categories/spirals.jpg",
        "Katti Roll": "images/categories/katti-roll.jpg",
        "Mo:Mo": "images/categories/momo.jpg",
        "Burger": "images/categories/burger.jpg",
        "Sandwich": "images/categories/sandwich.jpg",
        "Keema Noodles": "images/categories/keema-noodles.jpg",
        "Fried Rice": "images/categories/fried-rice.jpg",
        "Chowmein": "images/categories/chowmein.jpg",
        "Snacks": "images/categories/snacks.jpg",
        "Chicken Wings": "images/categories/chicken-wings.jpg",
        "Rice or Roti Meal": "images/categories/rice-roti.jpg",
        "Cold Drinks": "images/categories/cold-drinks.jpg",
        "Hot Drinks": "images/categories/hot-drinks.jpg"
    };

    function handleTabImageError(img, categoryName) {
        img.parentElement.innerHTML = `<div style="font-size:1.5rem;color:#666;">🍽️</div>`;
    }

    function generateCategoryTabs() {
        const container = document.getElementById('categoryTabs');
        container.innerHTML = '';
        let first = true;

        for (const category in MENU) {
            const tabId = category.toLowerCase().replace(/[ &\/]/g, '-');
            const button = document.createElement('button');
            button.className = `category-tab ${first ? 'active' : ''}`;
            button.setAttribute('data-category', tabId);
            button.setAttribute('role', 'tab');
            button.setAttribute('aria-selected', first ? 'true' : 'false');
            button.innerHTML = `
                <div class="tab-content">
                    <div class="tab-image">
                        <img src="${categoryImages[category] || ''}" alt="${category}" loading="lazy" onerror="handleTabImageError(this, '${category}')">
                    </div>
                    <span class="tab-text">${category}</span>
                </div>
            `;
            container.appendChild(button);
            first = false;
        }
    }

    function generateMenuItems() {
        const container = document.getElementById('menuItems');
        container.innerHTML = '';
        let first = true;

        for (const [category, items] of Object.entries(MENU)) {
            const categoryId = category.toLowerCase().replace(/[ &\/]/g, '-');
            const categoryDiv = document.createElement('div');
            categoryDiv.className = `category-content ${first ? 'active' : ''}`;
            categoryDiv.id = categoryId;
            categoryDiv.setAttribute('role', 'tabpanel');

            let itemsHTML = '';
            for (const item of items) {
                const hasVariants = item.variants && item.variants.length > 0;
                const hasExtras = item.extras && item.extras.length > 0;

                let displayPrice = `Rs ${item.price}`;
                let priceForButton = parsePrice(item.price);

                if (hasVariants) {
                    const prices = item.variants.map(v => v.price);
                    const minPrice = Math.min(...prices);
                    const maxPrice = Math.max(...prices);
                    displayPrice = `Rs ${minPrice} - ${maxPrice}`;
                    priceForButton = minPrice;
                }

                const buttonText = hasVariants ? 'Choose Variant' : 'Add to Cart';
                const buttonIcon = hasVariants ? 'list-ul' : 'plus';
                const btnClass = hasVariants ? 'customize-btn' : '';

                itemsHTML += `
                    <div class="menu-item-card">
                        <div class="item-main-container">
                            <div class="item-left">
                                <h3 class="item-name">${escapeHtml(item.name)}</h3>
                            </div>
                            <div class="item-right">
                                <div class="item-price">${displayPrice}</div>
                            </div>
                        </div>
                        ${item.details ? `<div class="item-details">${escapeHtml(item.details)}</div>` : ''}
                        <button class="add-to-cart-btn ${btnClass}" 
                                data-name="${escapeHtml(item.name)}" 
                                data-price="${priceForButton}"
                                data-has-variants="${hasVariants}"
                                data-has-extras="${hasExtras}">
                            <i class="fas fa-${buttonIcon}"></i> ${buttonText}
                        </button>
                    </div>
                `;
            }

            categoryDiv.innerHTML = `
                <div class="category-header">
                    <h2 class="category-title">${escapeHtml(category)}</h2>
                </div>
                <div class="category-items">${itemsHTML}</div>
            `;
            container.appendChild(categoryDiv);
            first = false;
        }
    }

    function setupTabSwitching() {
        const tabs = document.querySelectorAll('.category-tab');
        const contents = document.querySelectorAll('.category-content');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                tabs.forEach(t => {
                    t.classList.remove('active');
                    t.setAttribute('aria-selected', 'false');
                });
                contents.forEach(c => c.classList.remove('active'));

                tab.classList.add('active');
                tab.setAttribute('aria-selected', 'true');
                const id = tab.getAttribute('data-category');
                document.getElementById(id).classList.add('active');
            });
        });
    }

    // ---------- CART EVENT HANDLERS ----------
    function handleCartItemChange(e) {
        const target = e.target;
        if (target.classList.contains('extra-checkbox')) {
            const idx = parseInt(target.dataset.index);
            const name = target.dataset.name;
            const price = parseInt(target.dataset.price);
            const isChecked = target.checked;

            if (isChecked) {
                if (!cart[idx].extras.some(extra => extra.name === name)) {
                    cart[idx].extras.push({ name, price });
                }
            } else {
                cart[idx].extras = cart[idx].extras.filter(extra => extra.name !== name);
            }

            const extrasSum = cart[idx].extras.reduce((s, e) => s + e.price, 0);
            cart[idx].totalPrice = (cart[idx].basePrice + extrasSum) * cart[idx].quantity;
            saveCart();
            updateCartDisplay();
        }

        if (target.classList.contains('extra-radio')) {
            const idx = parseInt(target.dataset.index);
            const name = target.dataset.name;
            const price = parseInt(target.dataset.price);
            const group = target.dataset.group;

            // Remove all extras belonging to the same radio group
            const item = cart[idx];
            const extrasInGroup = item.availableExtras.filter(extra => extra.group === group);
            item.extras = item.extras.filter(extra => {
                const extraData = item.availableExtras.find(e => e.name === extra.name);
                return !extraData || extraData.group !== group;
            });

            // Add the selected one
            if (!item.extras.some(e => e.name === name)) {
                item.extras.push({ name, price });
            }

            const extrasSum = item.extras.reduce((s, e) => s + e.price, 0);
            item.totalPrice = (item.basePrice + extrasSum) * item.quantity;
            saveCart();
            updateCartDisplay();
        }
    }

    function handleCartItemClick(e) {
        let target = e.target;
        if (target.classList.contains('quantity-btn') || target.closest('.quantity-btn')) {
            const btn = target.closest('.quantity-btn');
            const idx = parseInt(btn.dataset.index);
            const action = btn.dataset.action;

            if (action === 'increase') {
                cart[idx].quantity += 1;
            } else if (action === 'decrease') {
                if (cart[idx].quantity > 1) {
                    cart[idx].quantity -= 1;
                } else {
                    cart.splice(idx, 1);
                    saveCart();
                    updateCartBadge();
                    updateCartDisplay();
                    return;
                }
            }

            const extrasSum = cart[idx].extras.reduce((s, e) => s + e.price, 0);
            cart[idx].totalPrice = (cart[idx].basePrice + extrasSum) * cart[idx].quantity;
            saveCart();
            updateCartBadge();
            updateCartDisplay();
        }

        if (target.classList.contains('remove-btn') || target.closest('.remove-btn')) {
            const btn = target.closest('.remove-btn');
            const idx = parseInt(btn.dataset.index);
            if (confirm('Remove this item?')) {
                cart.splice(idx, 1);
                saveCart();
                updateCartBadge();
                updateCartDisplay();
            }
        }
    }

    // ---------- MODAL HANDLERS ----------
    function openCustomizationModal(itemName) {
        const item = findMenuItem(itemName);
        if (!item || !item.variants) return;

        currentCustomizationItem = item;
        const modal = document.getElementById('customizationModal');
        const title = document.getElementById('customizationModalTitle');
        const body = document.getElementById('customizationBody');
        const totalSpan = document.getElementById('customTotalPrice');

        title.textContent = `Select Variant for ${itemName}`;

        let html = `<div class="customization-section"><h4>Select Variant</h4>`;
        let basePrice = 0;
        item.variants.forEach((variant, idx) => {
            html += `
                <label class="variant-option">
                    <input type="radio" name="variant" value="${escapeHtml(variant.name)}" data-price="${variant.price}" ${idx === 0 ? 'checked' : ''}>
                    <span class="variant-name">${escapeHtml(variant.name)}</span>
                    <span class="variant-price">Rs ${variant.price}</span>
                </label>
            `;
            if (idx === 0) basePrice = variant.price;
        });
        html += `</div>`;
        body.innerHTML = html;
        totalSpan.textContent = basePrice;

        // Update price when radio changes
        body.querySelectorAll('input[name="variant"]').forEach(radio => {
            radio.addEventListener('change', () => {
                const selected = document.querySelector('input[name="variant"]:checked');
                if (selected) totalSpan.textContent = selected.dataset.price;
            });
        });

        modal.style.display = 'block';
    }

    function closeCustomizationModal() {
        document.getElementById('customizationModal').style.display = 'none';
        currentCustomizationItem = null;
    }

    // ---------- INITIALIZATION ----------
    function init() {
        loadCart();

        // Fetch menu from external JSON, fallback to hardcoded if fails
        fetch('menu.json')
            .then(res => {
                if (!res.ok) throw new Error('Network response was not ok');
                return res.json();
            })
            .then(data => {
                MENU = data;
                renderMenu();
            })
            .catch(err => {
                console.warn('Could not load menu.json, using hardcoded fallback:', err);
                // Fallback hardcoded menu (abbreviated for brevity – you can keep your full MENU object here)
                MENU = {
                    "Aloo Fries": [
                        { "name": "Aloo Fries Medium", "price": 80 },
                        { "name": "Aloo Fries Large", "price": 130 }
                    ],
                    "Mo:Mo": [
                        {
                            "name": "Aloo Mo:Mo",
                            "variants": [
                                { "name": "Steam", "price": 100 },
                                { "name": "Kothey", "price": 120 }
                            ]
                        }
                    ]
                    // Add full fallback object if needed, but it's better to have a proper menu.json
                };
                renderMenu();
            });

        function renderMenu() {
            generateCategoryTabs();
            generateMenuItems();
            setupTabSwitching();
            document.getElementById('currentYear').textContent = new Date().getFullYear();
        }

        // Event listeners for cart
        const cartIcon = document.getElementById('cartIcon');
        const cartModal = document.getElementById('cartModal');
        const closeCart = document.getElementById('closeCart');
        const checkoutBtn = document.getElementById('checkoutBtn');

        cartIcon.addEventListener('click', () => {
            updateCartDisplay();
            cartModal.style.display = 'block';
        });
        closeCart.addEventListener('click', () => cartModal.style.display = 'none');
        window.addEventListener('click', (e) => {
            if (e.target === cartModal) cartModal.style.display = 'none';
        });

        checkoutBtn.addEventListener('click', () => {
            if (!cart.length) {
                alert('Your cart is empty!');
                return;
            }
            localStorage.setItem('daAlooOrigin', 'index.html');
            saveCart();
            window.location.href = 'location.html';
        });

        // Delegate cart interactions
        const cartItemsDiv = document.getElementById('cartItems');
        cartItemsDiv.addEventListener('change', handleCartItemChange);
        cartItemsDiv.addEventListener('click', handleCartItemClick);

        // Add-to-cart delegation
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.add-to-cart-btn');
            if (!btn) return;
            const name = btn.dataset.name;
            const price = parsePrice(btn.dataset.price);
            const hasVariants = btn.dataset.hasVariants === 'true';
            const hasExtras = btn.dataset.hasExtras === 'true';

            if (hasVariants) {
                openCustomizationModal(name);
            } else {
                const itemData = findMenuItem(name);
                const availableExtras = itemData && itemData.extras ? itemData.extras : [];
                addToCart(name, price, null, [], availableExtras);
                // Visual feedback
                const originalHTML = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-check"></i> Added!';
                btn.style.background = '#2ecc71';
                setTimeout(() => {
                    btn.innerHTML = originalHTML;
                    btn.style.background = '';
                }, 1000);
            }
        });

        // Customization modal
        const customModal = document.getElementById('customizationModal');
        const closeCustom = document.getElementById('closeCustomization');
        const cancelCustom = document.getElementById('cancelCustomization');
        const addCustom = document.getElementById('addToCartCustom');

        closeCustom.addEventListener('click', closeCustomizationModal);
        cancelCustom.addEventListener('click', closeCustomizationModal);
        addCustom.addEventListener('click', () => {
            if (!currentCustomizationItem) return;
            const selected = document.querySelector('input[name="variant"]:checked');
            if (selected) {
                const variant = {
                    name: selected.value,
                    price: parseInt(selected.dataset.price)
                };
                addToCart(currentCustomizationItem.name, variant.price, variant, [], []);
                closeCustomizationModal();
            } else {
                alert('Please select a variant');
            }
        });
        window.addEventListener('click', (e) => {
            if (e.target === customModal) closeCustomizationModal();
        });

        // Save menu button with error handling
        const saveBtn = document.getElementById('saveMenuBtn');
        const notification = document.getElementById('saveNotification');
        saveBtn.addEventListener('click', () => {
            const img = new Image();
            img.onload = () => {
                const link = document.createElement('a');
                link.href = 'images/menu.jpg';
                link.download = 'da-aloo-menu.jpg';
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                notification.classList.add('show');
                setTimeout(() => notification.classList.remove('show'), 3000);
            };
            img.onerror = () => {
                alert('Menu image not found. Please contact support.');
            };
            img.src = 'images/menu.jpg';
        });
    }

    document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
