<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <!-- Anti-cache -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Select Delivery Location - Da Aloo</title>

    <!-- Force HTTPS (except localhost) -->
    <script>
        if (window.location.protocol === 'http:' && !window.location.hostname.includes('localhost')) {
            window.location.href = 'https://' + window.location.hostname + window.location.pathname + window.location.search;
        }
    </script>

    <!-- Leaflet CSS + JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Font Awesome & Google Fonts -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #FDFD96;
            --primary-dark: #E6B800;
            --secondary: #000000;
            --background: #FFF9C4;
            --card: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--background);
            color: var(--secondary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .location-container {
            background-color: white;
            border-radius: 15px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
        }

        .location-header {
            background: var(--primary);
            color: #2C2D2D;
            padding: 1.5rem;
            border-radius: 15px 15px 0 0;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .location-header h2 {
            margin: 0;
            font-family: 'Bebas Neue', cursive;
            font-size: 3.5rem;
            letter-spacing: 1px;
        }

        .location-status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 1.8rem;
            font-weight: 700;
            color: #00000;
            text-align: center;
            padding: 10px 20px;
            margin: 0;
            width: 100%;
        }

        .location-status i {
            font-size: 2rem;
            color: #25D366;
        }

        .location-status.warning {
            color: #FF9800;
            background: #FFF3E0;
            border-radius: 10px;
            border: 2px solid #FF9800;
            padding: 12px 20px;
        }

        .location-status.warning i {
            color: #FF9800;
        }

        #map {
            height: 250px;
            width: 100%;
            border-radius: 8px;
            margin: 15px 0;
            border: 2px solid #f0f0f0;
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .map-loading {
            text-align: center;
            color: #666;
        }

        .map-loading i {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #000000;
        }

        .location-instructions {
            background: #f8f9fa;
            padding: 12px 15px;
            border-radius: 8px;
            border-left: 3px solid var(--primary);
            margin: 15px 0;
            font-size: 0.9rem;
        }

        .location-instructions i {
            color: var(--secondary);
            margin-right: 8px;
        }

        .location-footer {
            padding: 1rem 1.5rem;
            display: flex;
            border-top: 2px solid #eee;
            background: #f8f9fa;
        }

        .confirm-btn {
            width: 100%;
            padding: 1.2rem 1.5rem;
            background: #25D366;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 1.2rem;
            min-height: 60px;
            transition: background 0.3s, transform 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .confirm-btn:hover {
            background: #1ebe57;
            transform: translateY(-2px);
        }

        .confirm-btn:active {
            transform: translateY(0);
        }

        .leaflet-control-zoom {
            border: 2px solid var(--secondary) !important;
        }

        .leaflet-control-zoom a {
            background: var(--primary) !important;
            color: var(--secondary) !important;
            border: 1px solid var(--secondary) !important;
        }

        .leaflet-control-zoom a:hover {
            background: var(--secondary) !important;
            color: var(--primary) !important;
        }

        @media (max-width: 768px) {
            .location-container {
                width: 95%;
                max-height: 95vh;
            }

            .location-header h2 {
                font-size: 1.8rem;
            }

            #map {
                height: 200px;
            }

            .location-status {
                font-size: 1.15rem;
                padding: 8px 16px;
            }

            .location-status i {
                font-size: 1.8rem;
            }

            .confirm-btn {
                padding: 1rem 1.2rem;
                font-size: 1.1rem;
                min-height: 55px;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .location-header h2 {
                font-size: 1.6rem;
            }

            #map {
                height: 180px;
            }

            .location-status {
                font-size: 1.05rem;
                padding: 6px 12px;
                gap: 8px;
            }

            .location-status i {
                font-size: 1.7rem;
            }

            .confirm-btn {
                padding: 0.9rem 1rem;
                font-size: 1rem;
                min-height: 50px;
            }
        }
    </style>
</head>

<body>
    <div class="location-container">
        <div class="location-header">
            <div class="location-status" id="locationStatus">
                <i class="fas fa-spinner fa-spin"></i>
                <span>Checking location...</span>
            </div>
        </div>

        <div id="map">
            <div class="map-loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Getting your location...</p>
            </div>
        </div>

        <div class="location-instructions">
            <p><i class="fas fa-info-circle"></i> Drag the marker to choose a different delivery location.</p>
        </div>

        <div class="location-footer">
            <button class="confirm-btn" id="confirmLocationBtn">
                <i class="fab fa-whatsapp"></i> Order on WhatsApp
            </button>
        </div>
    </div>

    <script>
        // ----- Global Variables -----
        let map, marker;
        let isLiveLocation = false;
        let hasMarkerBeenDragged = false;
        let cart = [];
        const defaultLocation = { lat: 27.7172, lng: 85.3240 }; // Kathmandu

        // ----- Load Cart from localStorage -----
        try {
            const savedCart = localStorage.getItem('daAlooCart');
            if (savedCart) {
                cart = JSON.parse(savedCart);
                console.log('Cart loaded:', cart.length, 'items');
            }
        } catch (error) {
            console.error('Error loading cart:', error);
            cart = [];
        }

        // ----- Update Status UI -----
        function updateLocationStatus(isLive) {
            const statusDiv = document.getElementById('locationStatus');
            const icon = statusDiv.querySelector('i');
            const textSpan = statusDiv.querySelector('span');

            if (isLive) {
                statusDiv.className = 'location-status';
                icon.className = 'fas fa-check-circle';
                textSpan.textContent = 'Your live location is selected';
            } else {
                statusDiv.className = 'location-status warning';
                icon.className = 'fas fa-exclamation-triangle';
                textSpan.textContent = 'Turn on location or drag the marker to set delivery address';
            }
        }

        // ----- Initialize Map with given coordinates -----
        function initMap(lat, lng, isLive) {
            const mapContainer = document.getElementById('map');
            mapContainer.innerHTML = ''; // clear loading message

            map = L.map('map').setView([lat, lng], 16);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© OpenStreetMap contributors'
            }).addTo(map);

            marker = L.marker([lat, lng], { draggable: true }).addTo(map);
            marker.bindPopup('Drag me to adjust location').openPopup();

            marker.on('dragend', () => {
                hasMarkerBeenDragged = true;
                // Optionally show a small popup to confirm new location
                const pos = marker.getLatLng();
                marker.bindPopup(`Location set to ${pos.lat.toFixed(5)}, ${pos.lng.toFixed(5)}`).openPopup();
                setTimeout(() => marker.closePopup(), 2000);
            });

            isLiveLocation = isLive;
        }

        // ----- Get User Location (Promise) -----
        function getUserLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ lat: defaultLocation.lat, lng: defaultLocation.lng, isLive: false });
                    return;
                }

                let resolved = false;
                const success = (pos) => {
                    if (resolved) return;
                    resolved = true;
                    resolve({
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude,
                        isLive: true
                    });
                };

                const error = () => {
                    if (!resolved) {
                        resolved = true;
                        resolve({ lat: defaultLocation.lat, lng: defaultLocation.lng, isLive: false });
                    }
                };

                const watchId = navigator.geolocation.watchPosition(success, error, {
                    enableHighAccuracy: true,
                    maximumAge: 0,
                    timeout: 10000
                });

                // Fallback after 10 seconds
                setTimeout(() => {
                    if (!resolved) {
                        navigator.geolocation.clearWatch(watchId);
                        resolve({ lat: defaultLocation.lat, lng: defaultLocation.lng, isLive: false });
                    }
                }, 10000);
            });
        }

        // ----- Format Order Message for WhatsApp -----
        function formatOrderMessage(locationLink, locationText) {
            let message = "*My ORDER*\n\n*Order Details:*\n";
            const now = new Date();
            message += `Date: ${now.toLocaleDateString()} ${now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}\n\n`;

            let grandTotal = 0;

            if (cart.length === 0) {
                message += "No items in cart\n";
            } else {
                cart.forEach(item => {
                    // Use totalPrice (already includes quantity + extras)
                    let lineTotal = item.totalPrice || (item.price * (item.quantity || 1));
                    grandTotal += lineTotal;

                    message += `• ${item.quantity || 1}x ${item.name}`;
                    if (item.variant) {
                        message += ` (${item.variant.name})`;
                    }
                    if (item.extras && item.extras.length > 0) {
                        message += `\n   - Extras: ${item.extras.map(e => e.name).join(', ')}`;
                    }
                    if (item.details) {
                        message += `\n   _Items: ${item.details}_`;
                    }
                    message += `\n   - Rs ${lineTotal}\n\n`;
                });
            }

            message += `*Total Amount: Rs ${grandTotal}*\n\n*Delivery Location:* ${locationText}`;
            if (locationLink !== "No location sent") {
                message += `\n${locationLink}`;
            }
            message += `\n\nPlease confirm this order.\nThank you!`;
            return message;
        }

        // ----- Send Order to WhatsApp -----
        function sendOrderToWhatsApp() {
            if (!cart.length) {
                alert('Your cart is empty! Please add items first.');
                return;
            }

            if (!marker) {
                alert('Map is still loading. Please wait a moment.');
                return;
            }

            let locationText = "";
            let locationLink = "";

            // Determine location based on marker drag and live location status
            if (hasMarkerBeenDragged) {
                // Marker was moved – use that location
                const pos = marker.getLatLng();
                locationLink = `https://www.google.com/maps?q=${pos.lat.toFixed(6)},${pos.lng.toFixed(6)}`;
                locationText = "User selected location";
            } else if (isLiveLocation) {
                // Live location available and marker not moved – use live location
                const pos = marker.getLatLng();
                locationLink = `https://www.google.com/maps?q=${pos.lat.toFixed(6)},${pos.lng.toFixed(6)}`;
                locationText = "Live location";
            } else {
                // No live location and marker not moved – no location sent
                locationText = "No location sent - User did not select location";
                locationLink = "No location sent";
            }

            const message = formatOrderMessage(locationLink, locationText);
            const encodedMsg = encodeURIComponent(message);
            const whatsappUrl = `https://wa.me/9779847375984?text=${encodedMsg}`;

            // Clear cart
            localStorage.removeItem('daAlooCart');

            // Open WhatsApp
            window.open(whatsappUrl, '_blank');

            // Redirect back to origin page after a short delay
            setTimeout(() => {
                const origin = localStorage.getItem('daAlooOrigin') || 'index.html';
                window.location.href = origin;
            }, 2000);
        }

        // ----- Main Initialization -----
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const location = await getUserLocation();
                updateLocationStatus(location.isLive);
                initMap(location.lat, location.lng, location.isLive);
            } catch (err) {
                console.error('Map init failed:', err);
                updateLocationStatus(false);
                initMap(defaultLocation.lat, defaultLocation.lng, false);
            }

            document.getElementById('confirmLocationBtn').addEventListener('click', sendOrderToWhatsApp);
        });
    </script>
</body>
</html>
